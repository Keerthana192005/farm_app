services:
  - type: web
    name: farm-app
    env: python
    plan: free
    pythonVersion: 3.11.9
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT wsgi:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: farm-app-db
          property: connectionString
